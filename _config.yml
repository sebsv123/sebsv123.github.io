# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Sebastián Sifontes"
title_separator          : "-"
name                     : &name "Sebastián Sifontes"
description              : &description "Full-Stack AI Engineer · Building production AI systems · Madrid"
url                      : "https://sebsv123.github.io"
baseurl                  : ""
repository               : "sebsv123/sebsv123.github.io"

# Site Author
author:
  avatar           : "profile.png"
  name             : "Sebastián Sifontes"
  pronouns         :
  bio              : "Full-Stack AI Engineer. Building ViraClip, agente_seguros_ai, and other AI-powered products. Economist turned engineer."
  location         : "Madrid, Spain"
  employer         : "Freelance · Entrepreneur"
  uri              : "https://sebsv123.github.io"
  email            : "sebastiansvsv@gmail.com"

  # Academic (not applicable)
  academia         :
  arxiv            :
  googlescholar    :
  impactstory      :
  orcid            :
  semantic         :
  pubmed           :
  researchgate     :
  scopus           :

  # Dev
  github           : "sebsv123"
  bitbucket        :
  codepen          :
  dribbble         :
  kaggle           :
  stackoverflow    :

  # Social
  linkedin         : "sebastian-sifontes-valentin-752665187"
  twitter          :
  instagram        :
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  keybase          :
  lastfm           :
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

# Publication categories (kept for Jekyll compat)
publication_category:
  manuscripts:
    title: 'Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false

# SEO
google_site_verification :
bing_site_verification   :

# Analytics
analytics:
  provider               : "false"
  google:
    tracking_id          :

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - talkmap.ipynb
  - talkmap_out.ipynb
  - talkmap.py
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections — only portfolio active
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Madrid

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
